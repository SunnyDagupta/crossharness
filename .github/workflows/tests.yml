name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Unit tests
        run: python3 -m unittest discover -s tests -v
      - name: Demo runs end to end
        run: python3 demo.py
      - name: Recovery eval reproduces the layer-attribution table
        run: python3 eval.py --assert
